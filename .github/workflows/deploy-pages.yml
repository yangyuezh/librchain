name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'public/news.json'
      - 'public/feed.xml'
      - 'public/sitemap.xml'
      - 'public/robots.txt'
      - 'public/*.txt'
      - 'public/news/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish
        id: publish
        continue-on-error: true
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: librchain
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Warn If Publish Fails
        if: steps.publish.outcome == 'failure'
        run: |
          echo "::warning::Cloudflare publish failed because CLOUDFLARE_API_TOKEN is invalid or expired."
